            background-color: var(--primary);

            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 500;

        button:hover {
            background-color: var(--primary-hover);
        }

        button.secondary {
            background-color: transparent;

            color: #64748b;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }

            background-color: #f1f5f9;
            border: 1px dashed #cbd5e1;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.5rem;
            text-align: center;
            font-weight: 500;
        }

        .clue-item {
            background: white;
            padding: 0.375rem;
            border-radius: 0.25rem;
            border: 1px solid var(--border);
        }

        .passage {
            font-size: 1.125rem;
            line-height: 2.2;
            text-align: justify;
            margin-bottom: 2rem;
        }

        .gap-input {
            width: 120px;
            padding: 0.2rem 0.5rem;
            margin: 0 0.25rem;
            border: 1px solid #94a3b8;
            border-radius: 0.25rem;
            font-size: 1rem;
            text-align: center;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.2s;
        }

        .gap-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .gap-label {
            font-weight: bold;
            color: #475569;
            margin-right: 0.125rem;
        }

        .action-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .result-panel {
            font-size: 1.25rem;
            font-weight: bold;
            display: none;
        }

        .correct-ans {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
        }

        .wrong-ans {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: var(--danger) !important;
        }

        .review-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border);
            display: none;
        }

            border: 1px solid var(--border);

        }

        .footer-note {

            margin-top: 3rem;
            font-size: 0.875rem;
            color: #64748b;
        }

        let activeIndex = 1;
        const totalQuestions = 95;

        const selector = document.getElementById('questionSelector');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const metaBox = document.getElementById('metaInfo');
        const clueBox = document.getElementById('clueBox');
        const passageBox = document.getElementById('passageBox');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultPanel = document.getElementById('resultPanel');
        const reviewSection = document.getElementById('reviewSection');
        const reviewGrid = document.getElementById('reviewGrid');

        // Setup drop-down options
        for (let i = 1; i <= totalQuestions; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `Question ${i}`;
            selector.appendChild(opt);
        }

        function loadQuestion(id) {
            activeIndex = parseInt(id);
            selector.value = activeIndex;
            metaBox.textContent = `Question ${activeIndex} of ${totalQuestions}`;
            
            // Clean view states
            resultPanel.style.display = 'none';
            reviewSection.style.display = 'none';
            
            const q = database[activeIndex];
            
            // Build clues element block
            clueBox.innerHTML = '';
            q.clues.forEach(word => {
                const span = document.createElement('div');
                span.className = 'clue-item';
                span.textContent = word;
                clueBox.appendChild(span);
            });

            // Convert textual placeholders to dynamic html form items safely
            let formattedText = q.text;
            const alphabet = ['a','b','c','d','e','f','g','h','i','j'];
            
            alphabet.forEach((letter, i) => {
                const target = `<gap ${letter}>`;
                const replacement = `
                    <span class="gap-label">(${letter})</span>
                    <input type="text" class="gap-input" data-index="${i}" autocomplete="off">
                `;
                formattedText = formattedText.split(target).join(replacement);
            });
            
            passageBox.innerHTML = formattedText;
        }

        function evaluateAnswers() {
            const inputs = document.querySelectorAll('.gap-input');
            const targetData = database[activeIndex];
            let correctCount = 0;

            inputs.forEach(input => {
                const idx = parseInt(input.getAttribute('data-index'));
                const studentAns = input.value.trim().toLowerCase();
                const officialAns = targetData.keys[idx].toLowerCase();

                // Validation logic setup for flexible keys like "Certainly/Both" or alternate slashes
                let matchOptions = officialAns.split('/');
                let isCorrect = matchOptions.some(option => option.trim() === studentAns);

                if (isCorrect && studentAns !== "") {
                    input.className = 'gap-input correct-ans';
                    correctCount++;
                } else {
                    input.className = 'gap-input wrong-ans';
                }
            });

            // Render score breakdown (0.5 marks per item)
            const calculatedMark = (correctCount * 0.5).toFixed(1);
            resultPanel.innerHTML = `Score: <span style="color: var(--success);">${calculatedMark}</span> / 5.0 (${correctCount}/10 correct)`;
            resultPanel.style.display = 'block';

            // Present Answer key lists safely inside the grid layout
            reviewGrid.innerHTML = '';
            const labels = ['a','b','c','d','e','f','g','h','i','j'];
            targetData.keys.forEach((key, idx) => {
                const item = document.createElement('div');
                item.className = 'review-item';
                item.innerHTML = `<strong>(${labels[idx]})</strong> ${key}`;
                reviewGrid.appendChild(item);
            });
            reviewSection.style.display = 'block';
        }

        // Action controllers bindings
        submitBtn.addEventListener('click', evaluateAnswers);
        
        resetBtn.addEventListener('click', () => {
            loadQuestion(activeIndex);
        });

        selector.addEventListener('change', (e) => {
            loadQuestion(e.target.value);
        });

        prevBtn.addEventListener('click', () => {
            if (activeIndex > 1) loadQuestion(activeIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (activeIndex < totalQuestions) loadQuestion(activeIndex + 1);
        });

        // Instantiate first item load implicitly
        loadQuestion(1);
    </script>
